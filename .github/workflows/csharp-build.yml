name: Build C# DLL

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - 'keepass/**'
      - '.github/workflows/csharp-build.yml'
  pull_request:
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - 'keepass/**'
      - '.github/workflows/csharp-build.yml'

jobs:
  build:
    name: Build HttpsTypeSearch DLL
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify KeePass reference
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $keepassExe = Join-Path $env:GITHUB_WORKSPACE 'keepass\KeePass.exe'
          if (-not (Test-Path $keepassExe)) {
            throw "KeePass reference was not found: $keepassExe"
          }
          Write-Host "Using KeePass reference: $keepassExe"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release DLL
        run: msbuild HttpsTypeSearch.csproj /m /p:Configuration=Release /p:Platform=AnyCPU

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: HttpsTypeSearch-dll
          path: bin/Release/HttpsTypeSearch.dll
          if-no-files-found: error
